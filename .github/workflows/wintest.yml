name: WinGUIStatic

# Iteration harness for a fully-static single-exe Windows GUI (workflow_dispatch
# only). Uses MSYS2's static Qt5 (mingw-w64-x86_64-qt5-static) + -all-static so
# VIPSTARCOIN-qt.exe ships as a standalone exe with no bundled DLLs/plugins.
# Folded into release.yml once green, then this file is deleted.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-amd64-static:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git autoconf automake libtool pkgconf zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-db
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-qt5-static
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib

      - name: Diagnose static Qt
        run: |
          set +e +o pipefail
          echo "== qmake QT_INSTALL_PLUGINS / PREFIX =="; /mingw64/qt5-static/bin/qmake -query | grep -iE "INSTALL_PLUGINS|INSTALL_PREFIX|INSTALL_LIBS"
          echo "== static platform plugin (libqwindows.a) =="; find /mingw64/qt5-static -iname 'libqwindows*' 2>/dev/null
          echo "== plugin dirs =="; find /mingw64/qt5-static -type d -name platforms 2>/dev/null
          echo "== pkg-config --static --libs Qt5* =="; PKG_CONFIG_PATH=/mingw64/qt5-static/lib/pkgconfig PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 pkg-config --static --libs Qt5Core Qt5Gui Qt5Widgets Qt5Network 2>&1 | head -c 2000; echo
          echo "== is Qt5Gui.pc static? (has Requires.private) =="; grep -iE "Requires|Libs.private" /mingw64/qt5-static/lib/pkgconfig/Qt5Gui.pc 2>&1 | head -3
          echo "== split *Support.a libs (Qt5PlatformSupport.pc is gone in Qt>=5.8) =="; ls /mingw64/qt5-static/lib/libQt5*Support.a 2>/dev/null
          echo "== qwindows.prl (authoritative static dep list for the platform plugin) =="; cat /mingw64/qt5-static/share/qt5/plugins/platforms/qwindows.prl 2>/dev/null
          echo "== bundled font/image static libs =="; ls /mingw64/qt5-static/lib/ 2>/dev/null | grep -iE 'freetype|harfbuzz|png|jpeg'
          true

      - name: Build protobuf 3.21 (C++14, static)
        run: |
          set -e
          git clone --depth 1 -b v3.21.12 https://github.com/protocolbuffers/protobuf "$HOME/pbsrc"
          cd "$HOME/pbsrc"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release -Dprotobuf_BUILD_TESTS=OFF \
            -Dprotobuf_BUILD_SHARED_LIBS=OFF -Dprotobuf_WITH_ZLIB=OFF \
            -DCMAKE_CXX_STANDARD=14 -DCMAKE_INSTALL_PREFIX="$HOME/pb21"
          ninja -C build && ninja -C build install

      - name: Build VIPSTARCOIN (static Qt5 GUI -> single exe)
        run: |
          set -e
          unset JAVA_HOME
          QTS=/mingw64/qt5-static
          export WANT_PKGCONFIG=yes PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1
          # static-Qt prefix first; --static so pkg-config emits the transitive deps
          export PKG_CONFIG="pkg-config --static"
          export PKG_CONFIG_PATH="$QTS/lib/pkgconfig:$HOME/pb21/lib/pkgconfig:/mingw64/lib/pkgconfig"
          export PATH="$QTS/bin:$HOME/pb21/bin:$PATH"
          # Qt>=5.8 dropped the aggregate Qt5PlatformSupport.pc and split it into
          # private *Support static libs that the static qwindows plugin needs.
          # configure's PKG_CHECK_MODULES([Qt5PlatformSupport]) is fatal when the
          # .pc is absent, so pre-set QTPLATFORM_{CFLAGS,LIBS}: PKG_CHECK_MODULES
          # then uses them verbatim and never calls pkg-config. Glob whatever
          # *Support.a MSYS2 ships (+ bundled freetype) and wrap in a linker group
          # so static link order among them is moot.
          SUPP=""
          for f in "$QTS"/lib/libQt5*Support.a "$QTS"/lib/libqtfreetype.a; do
            [ -e "$f" ] || continue
            b=$(basename "$f" .a); SUPP="$SUPP -l${b#lib}"
          done
          export QTPLATFORM_CFLAGS=" "
          # qwindows.prl also pulls in these system import libs (DirectWrite/Direct2D
          # font rendering, DWM, printing, session) that no public Qt5*.pc carries.
          # All deps live inside one --start-group so single-pass link order is moot.
          export QTPLATFORM_LIBS="-L$QTS/lib -Wl,--start-group$SUPP -ldwrite -ld2d1 -lwtsapi32 -lwinspool -lshlwapi -ldwmapi -Wl,--end-group"
          echo "QTPLATFORM_LIBS=$QTPLATFORM_LIBS"
          ./autogen.sh
          CFG_RC=0
          ./configure --with-gui=qt5 --without-miniupnpc --with-incompatible-bdb --disable-reduce-exports --disable-shared \
            --with-boost=/mingw64 --with-boost-libdir=/mingw64/lib \
            --with-qt-plugindir="$QTS/share/qt5/plugins" --with-qt-bindir="$QTS/bin" \
            CXXFLAGS="-std=c++14" \
            PROTOC="$HOME/pb21/bin/protoc.exe" \
            MOC=$QTS/bin/moc UIC=$QTS/bin/uic RCC=$QTS/bin/rcc \
            LRELEASE=$QTS/bin/lrelease LUPDATE=$QTS/bin/lupdate \
            LDFLAGS="-static -static-libgcc -static-libstdc++" \
            BDB_LIBS="-ldb_cxx" BDB_CFLAGS="" || CFG_RC=$?
          if [ "$CFG_RC" != 0 ]; then
            set +e
            echo "=== configure FAILED (rc=$CFG_RC). config.log -lqwindows link block: ==="
            sed -n '/static Qt plugins: -lqwindows/,/\$? = /p' config.log | tail -120
            echo "=== cannot-find-lib / undefined refs anywhere in config.log: ==="
            grep -nE "cannot find -l|undefined reference|ld returned 1|undefined symbol" config.log | tail -50
            exit 1
          fi
          # keep the MinGW default LIBTOOL_APP_LDFLAGS=-all-static (static Qt has .a now)
          make -j3

      - name: Package single exe + verify no DLL deps
        run: |
          set +e +o pipefail
          OUT="VIPSTARCOIN-windows-amd64-static"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b.exe" "$OUT/" 2>/dev/null; done
          cp src/qt/VIPSTARCOIN-qt.exe "$OUT/"
          echo "=== sizes ==="; ls -lh "$OUT"
          echo "=== ldd VIPSTARCOIN-qt.exe (want: NO /mingw64 DLLs) ==="
          ldd "$OUT/VIPSTARCOIN-qt.exe" | grep -i mingw64 && echo "  ^ still has DLL deps" || echo "  (fully static — no mingw64 DLL deps)"
          zip -r "${OUT}.zip" "$OUT" >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-static
          path: VIPSTARCOIN-windows-amd64-static.zip
          if-no-files-found: warn
