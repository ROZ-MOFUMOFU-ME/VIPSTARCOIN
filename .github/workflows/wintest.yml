name: WinGUITest

# Iteration harness for the Windows GUI build (workflow_dispatch only; never runs
# automatically). Builds protobuf 3.21 as C++14 (MSYS2 only ships 5.x which needs
# C++17, and configure's C++11 probe breaks under C++17) and links the Qt5 GUI
# against it, then bundles Qt + dependency DLLs with windeployqt. Folded into
# release.yml once green, then this file is deleted.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-amd64-gui:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git autoconf automake libtool pkgconf zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-db
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib

      - name: Build protobuf 3.21 (C++14, static)
        run: |
          set -e
          git clone --depth 1 -b v3.21.12 https://github.com/protocolbuffers/protobuf "$HOME/pbsrc"
          cd "$HOME/pbsrc"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -Dprotobuf_BUILD_TESTS=OFF \
            -Dprotobuf_BUILD_SHARED_LIBS=OFF \
            -DCMAKE_CXX_STANDARD=14 \
            -DCMAKE_INSTALL_PREFIX="$HOME/pb21"
          ninja -C build
          ninja -C build install
          "$HOME/pb21/bin/protoc.exe" --version

      - name: Build VIPSTARCOIN (Qt5 GUI, C++14, protobuf 21)
        run: |
          set -e
          unset JAVA_HOME
          export PKG_CONFIG_PATH="$HOME/pb21/lib/pkgconfig:$PKG_CONFIG_PATH"
          export PATH="$HOME/pb21/bin:$PATH"
          # configure.ac forces use_pkgconfig=no on MinGW, so Qt is found via
          # manual --with-qt-* paths. Query them from qmake (robust to layout).
          QMAKE=$(command -v qmake || command -v qmake-qt5)
          QH=$("$QMAKE" -query QT_INSTALL_HEADERS)
          QL=$("$QMAKE" -query QT_INSTALL_LIBS)
          QP=$("$QMAKE" -query QT_INSTALL_PLUGINS)
          echo "Qt: headers=$QH libs=$QL plugins=$QP"
          ./autogen.sh
          ./configure --with-gui=qt5 --without-miniupnpc --with-incompatible-bdb --disable-reduce-exports --disable-shared \
            --with-qt-incdir="$QH" --with-qt-libdir="$QL" --with-qt-plugindir="$QP" \
            --with-boost=/mingw64 --with-boost-libdir=/mingw64/lib \
            CXXFLAGS="-std=c++14" \
            PROTOC="$HOME/pb21/bin/protoc.exe" \
            BDB_LIBS="-ldb_cxx" BDB_CFLAGS=""
          make -j3

      - name: Package GUI + bundle DLLs
        run: |
          set -e
          OUT="VIPSTARCOIN-windows-amd64-gui"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b.exe" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt.exe "$OUT/"
          ( command -v windeployqt && windeployqt --release --compiler-runtime "$OUT/VIPSTARCOIN-qt.exe" ) \
            || windeployqt-qt5 --release --compiler-runtime "$OUT/VIPSTARCOIN-qt.exe"
          # Copy any remaining MinGW/runtime DLLs the binaries need (transitive).
          for pass in 1 2 3; do
            for f in "$OUT"/*.exe "$OUT"/*.dll; do
              [ -e "$f" ] || continue
              ldd "$f" 2>/dev/null | grep -i '/mingw64/bin/' | awk '{print $3}' | while read -r d; do
                cp -n "$d" "$OUT/" 2>/dev/null || true
              done
            done
          done
          echo "=== package contents ==="; ls -1 "$OUT" | head -60; echo "file count: $(ls -1 "$OUT" | wc -l)"
          zip -r "${OUT}.zip" "$OUT" >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64-gui
          path: VIPSTARCOIN-windows-amd64-gui.zip
          if-no-files-found: warn
