name: Release

# Build VIPSTARCOIN binaries for every supported platform and publish them as a
# GitHub Release when a tag like v1.2.3 is pushed. Use the Actions tab
# (workflow_dispatch) to test the builds without publishing a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  MAKEJOBS: "-j3"

jobs:
  # -------------------------------------------------------------------------
  # Linux amd64 (ubuntu-22.04) and arm64 (ubuntu-24.04-arm) — native build
  # against system Qt5/Boost/OpenSSL/libevent + Berkeley DB 4.8 (install_db4.sh).
  # -------------------------------------------------------------------------
  linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-22.04
          - name: linux-arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libtool autotools-dev automake pkg-config bsdmainutils \
            curl ca-certificates python3 \
            libssl-dev libevent-dev libboost-all-dev \
            qtbase5-dev qttools5-dev qttools5-dev-tools libqt5svg5-dev \
            libprotobuf-dev protobuf-compiler libqrencode-dev libminiupnpc-dev
      - name: Build Berkeley DB 4.8
        run: ./contrib/install_db4.sh "$(pwd)"
      - name: Build minimal static libzmq
        run: |
          # Mining pools (NOMP) need ZMQ block notifications, which the official
          # depends build shipped. Ubuntu's libzmq.a drags in krb5/pgm/norm/icu and
          # can't be statically linked cleanly, so build a minimal libzmq from
          # source (no libsodium/pgm/norm/gssapi) -> a dependency-free static
          # libzmq.a that enables ZMQ without breaking the portable linking above.
          git clone --depth 1 -b v4.3.5 https://github.com/zeromq/libzmq /tmp/libzmq
          cd /tmp/libzmq
          ./autogen.sh
          ./configure --prefix="$HOME/zmqinst" --disable-shared --enable-static --without-libsodium
          make ${MAKEJOBS}
          make install
      - name: Build VIPSTARCOIN
        run: |
          ./autogen.sh
          export BDB_PREFIX="$PWD/db4"
          export PKG_CONFIG_PATH="$HOME/zmqinst/lib/pkgconfig:$PKG_CONFIG_PATH"
          ./configure --with-gui=qt5 \
            BDB_LIBS="-L${BDB_PREFIX}/lib -ldb_cxx-4.8" BDB_CFLAGS="-I${BDB_PREFIX}/include"
          # Statically link the version-volatile libraries (Boost, miniupnpc,
          # libevent; BDB 4.8 is already static) so VIPSTARCOINd/-cli/-tx run on
          # any modern glibc -- e.g. Debian 13 (Boost 1.83) -- instead of needing
          # the build host's exact .so versions. libcrypto/glibc/libstdc++ stay
          # dynamic (stable, security-updated, present on every modern distro).
          L=/usr/lib/$(gcc -print-multiarch)
          make ${MAKEJOBS} \
            BOOST_LIBS="-Wl,--start-group $L/libboost_system.a $L/libboost_filesystem.a $L/libboost_program_options.a $L/libboost_thread.a $L/libboost_chrono.a $L/libboost_random.a -Wl,--end-group" \
            MINIUPNPC_LIBS="$L/libminiupnpc.a" \
            EVENT_LIBS="$L/libevent.a" \
            EVENT_PTHREADS_LIBS="$L/libevent_pthreads.a $L/libevent.a"
      - name: Stage and package
        run: |
          OUT="VIPSTARCOIN-${{ matrix.name }}"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt "$OUT/" 2>/dev/null || true
          strip "$OUT/"* 2>/dev/null || true
          ls -lh "$OUT"
          tar -czf "${OUT}.tar.gz" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: VIPSTARCOIN-${{ matrix.name }}.tar.gz
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # macOS arm64 (macos-14) — native build via Homebrew.
  # (amd64/macos-13 dropped: GitHub's free Intel runner never schedules, so the
  # job sat queued indefinitely and stalled the release publish job.)
  # -------------------------------------------------------------------------
  macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      - name: Install dependencies
        run: brew install automake libtool boost pkg-config libevent qt@5 berkeley-db@4 qrencode miniupnpc protobuf@21 openssl@3
      - name: Build VIPSTARCOIN
        run: |
          ./autogen.sh
          export PATH="$(brew --prefix qt@5)/bin:$(brew --prefix protobuf@21)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:$(brew --prefix protobuf@21)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig"
          BDB="$(brew --prefix berkeley-db@4)"
          BOOST="$(brew --prefix boost)"
          # Homebrew Boost (>=1.84) requires C++14+, but the tree configures as
          # C++11. Build macOS as C++14 (a near-superset of C++11) so Boost's
          # headers compile and AX_BOOST_SYSTEM's link test succeeds.
          # --disable-shared: macOS ld rejects undefined symbols in the shared
          # libbitcoinconsensus.dylib (the binaries are linked from the static
          # libs anyway), so skip building it.
          ./configure --with-gui=qt5 --with-incompatible-bdb --disable-reduce-exports --disable-shared \
            --with-boost="$BOOST" --with-boost-libdir="$BOOST/lib" \
            CXXFLAGS="-std=c++14" \
            BDB_LIBS="-L${BDB}/lib -ldb_cxx" BDB_CFLAGS="-I${BDB}/include"
          make ${MAKEJOBS}
      - name: Stage and package
        run: |
          OUT="VIPSTARCOIN-${{ matrix.name }}"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt "$OUT/" 2>/dev/null || true
          ls -lh "$OUT"
          tar -czf "${OUT}.tar.gz" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: VIPSTARCOIN-${{ matrix.name }}.tar.gz
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Windows amd64 — fully-static single-exe GUI via MSYS2's static Qt5
  # (mingw-w64-x86_64-qt5-static) + -all-static, so VIPSTARCOIN-qt.exe ships
  # standalone with NO bundled DLLs/plugins. MSYS2 ships protobuf 5.x (needs
  # C++17, breaks the tree's C++11 probe) and BDB/qrencode without static libs,
  # so protobuf 3.21, qrencode 4.1.1 and Berkeley DB 4.8 are built static from
  # source. The static JPEG image-format plugin is linked by full path so the
  # background.jpg dress-up works. (Recipe proven by the WinGUIStatic workflow.)
  # -------------------------------------------------------------------------
  windows-amd64:
    name: windows-amd64
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git autoconf automake libtool pkgconf zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-db
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-qt5-static
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-zstd
      - name: Build protobuf 3.21 (C++14, static)
        run: |
          set -e
          git clone --depth 1 -b v3.21.12 https://github.com/protocolbuffers/protobuf "$HOME/pbsrc"
          cd "$HOME/pbsrc"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release -Dprotobuf_BUILD_TESTS=OFF \
            -Dprotobuf_BUILD_SHARED_LIBS=OFF -Dprotobuf_WITH_ZLIB=OFF \
            -DCMAKE_CXX_STANDARD=14 -DCMAKE_INSTALL_PREFIX="$HOME/pb21"
          ninja -C build && ninja -C build install
      - name: Build qrencode 4.1.1 (static)
        run: |
          set -e
          # MSYS2 ships qrencode as an import lib only (no libqrencode.a), so the
          # all-static GUI link fails with "cannot find -lqrencode". Build a static
          # libqrencode.a from source (no tools -> no libpng dep).
          git clone --depth 1 -b v4.1.1 https://github.com/fukuchi/libqrencode "$HOME/qrsrc"
          # qrencode 4.1.1's cmake_minimum_required predates 3.5, which CMake 4.x
          # refuses; the policy-min flag lets it configure anyway.
          cmake -G Ninja -S "$HOME/qrsrc" -B "$HOME/qrsrc/build" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
            -DWITH_TOOLS=NO -DWITH_TESTS=NO -DCMAKE_INSTALL_PREFIX="$HOME/qr"
          ninja -C "$HOME/qrsrc/build" && ninja -C "$HOME/qrsrc/build" install
      - name: Build Berkeley DB 4.8 (static, MinGW)
        run: |
          set -e
          # MSYS2 ships BDB as a DLL only (libdb_cxx-6.2.dll), which keeps the GUI
          # link dynamic and drags in libgcc/libstdc++/libwinpthread DLLs. Build a
          # static BDB 4.8 so the exe is self-contained and the wallet uses the
          # portable 4.8 format.
          ./contrib/install_db4.sh "$PWD" --enable-mingw
          ls -l "$PWD/db4/lib/libdb_cxx-4.8.a"
      - name: Build VIPSTARCOIN (static Qt5 GUI -> single exe)
        run: |
          set -e
          unset JAVA_HOME
          QTS=/mingw64/qt5-static
          export WANT_PKGCONFIG=yes PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1
          # static-Qt prefix first; --static so pkg-config emits the transitive deps
          export PKG_CONFIG="pkg-config --static"
          export PKG_CONFIG_PATH="$QTS/lib/pkgconfig:$HOME/pb21/lib/pkgconfig:/mingw64/lib/pkgconfig"
          export PATH="$QTS/bin:$HOME/pb21/bin:$PATH"
          # MSYS2's qt5-static .pc files reference zlib/zstd as `-l:libz` / `-l:libzstd`
          # (exact filenames that don't exist — only libz.a / libzstd.a do), so the
          # static link dies with "cannot find -l:libz". Rewrite to plain -lz/-lzstd
          # (zstd first so the libz rule can't clip `-l:libzstd`).
          sed -i -E 's/-l:libzstd(\.a)?/-lzstd/g; s/-l:libz(\.a)?/-lz/g' "$QTS"/lib/pkgconfig/*.pc
          # Qt>=5.8 dropped the aggregate Qt5PlatformSupport.pc and split it into
          # private *Support static libs that the static qwindows plugin needs.
          # configure's PKG_CHECK_MODULES([Qt5PlatformSupport]) is fatal when the
          # .pc is absent, so pre-set QTPLATFORM_{CFLAGS,LIBS}: PKG_CHECK_MODULES
          # then uses them verbatim and never calls pkg-config.
          SUPP=""
          for f in "$QTS"/lib/libQt5*Support.a "$QTS"/lib/libqtfreetype.a; do
            [ -e "$f" ] || continue
            b=$(basename "$f" .a); SUPP="$SUPP -l${b#lib}"
          done
          export QTPLATFORM_CFLAGS=" "
          # The static QJpegPlugin (background.jpg dress-up) must be linked in by
          # full path: libtool silently drops a bare -lqjpeg from a non-standard
          # plugin -L path, but passes a full-path .a straight through in position.
          # Plugin archive first, then Qt's bundled libjpeg it depends on.
          JPEG_A=""
          for f in "$QTS"/share/qt5/plugins/imageformats/libqjpeg.a "$QTS"/lib/libqtlibjpeg.a; do
            [ -e "$f" ] && JPEG_A="$JPEG_A $f"
          done
          # qwindows.prl also pulls in these system import libs (DirectWrite/Direct2D
          # font rendering, DWM, printing, session) that no public Qt5*.pc carries.
          # All deps live inside one --start-group so single-pass link order is moot.
          export QTPLATFORM_LIBS="-L$QTS/lib -Wl,--start-group$SUPP -ldwrite -ld2d1 -lwtsapi32 -lwinspool -lshlwapi -ldwmapi -Wl,--end-group$JPEG_A"
          export QR_CFLAGS="-I$HOME/qr/include"
          export QR_LIBS="-L$HOME/qr/lib -lqrencode"
          # MSYS2's gcc enables _GLIBCXX_ASSERTIONS by default; its runtime UB
          # checks abort initial block download on this tree's pre-existing
          # technical UB that official/Bitcoin Core release builds (assertions
          # OFF) tolerate. A command-line -U is ignored, so neutralize the header
          # define and also pass -D_GLIBCXX_NO_ASSERTIONS (skips the conditional
          # re-define). This makes the release behave like the official build.
          for f in $(find /mingw64/include/c++ -name c++config.h); do
            sed -i -E 's|^#[[:space:]]*define _GLIBCXX_ASSERTIONS 1|/* _GLIBCXX_ASSERTIONS off (match Bitcoin Core release build) */|' "$f"
          done
          ./autogen.sh
          ./configure --with-gui=qt5 --without-miniupnpc --disable-reduce-exports --disable-shared \
            --with-boost=/mingw64 --with-boost-libdir=/mingw64/lib \
            --with-qt-plugindir="$QTS/share/qt5/plugins" --with-qt-bindir="$QTS/bin" \
            CXXFLAGS="-std=c++14 -D_GLIBCXX_NO_ASSERTIONS" \
            PROTOC="$HOME/pb21/bin/protoc.exe" \
            MOC=$QTS/bin/moc UIC=$QTS/bin/uic RCC=$QTS/bin/rcc \
            LRELEASE=$QTS/bin/lrelease LUPDATE=$QTS/bin/lupdate \
            LDFLAGS="-static -static-libgcc -static-libstdc++" \
            BDB_LIBS="-L$PWD/db4/lib -ldb_cxx-4.8" BDB_CFLAGS="-I$PWD/db4/include"
          # keep the MinGW default LIBTOOL_APP_LDFLAGS=-all-static (static Qt has .a now)
          make ${MAKEJOBS}
      - name: Stage and package (single static exe)
        run: |
          set +e +o pipefail
          OUT="VIPSTARCOIN-windows-amd64"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b.exe" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt.exe "$OUT/"
          for f in "$OUT"/*.exe; do strip "$f" 2>/dev/null || true; done
          echo "=== sizes ==="; ls -lh "$OUT"
          echo "=== ldd VIPSTARCOIN-qt.exe (want: NO /mingw64 DLLs) ==="
          ldd "$OUT/VIPSTARCOIN-qt.exe" | grep -i mingw64 && echo "  ^ still has DLL deps" || echo "  (fully static — no mingw64 DLL deps)"
          zip -r "${OUT}.zip" "$OUT" >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: VIPSTARCOIN-windows-amd64.zip
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Publish whatever built successfully (tag pushes only). Runs even if some
  # platform jobs failed, so a partial set of binaries is still released.
  # -------------------------------------------------------------------------
  release:
    name: Publish Release
    # Wait for every platform job (incl. the slower static Windows build) so its
    # artifact is uploaded before we download+publish. windows-amd64 is
    # continue-on-error and `if: always()` runs publish regardless, so a Windows
    # failure still never blocks the linux/macOS release — but when Windows
    # succeeds (just slower than linux/macOS) its zip is no longer raced out.
    needs: [linux, macos, windows-amd64]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Show artifacts
        run: find artifacts -type f || true
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          name: VIPSTARCOIN ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
