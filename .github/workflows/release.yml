name: Release

# Build VIPSTARCOIN binaries for every supported platform and publish them as a
# GitHub Release when a tag like v1.2.3 is pushed. Use the Actions tab
# (workflow_dispatch) to test the builds without publishing a release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  MAKEJOBS: "-j3"

jobs:
  # -------------------------------------------------------------------------
  # Linux amd64 (ubuntu-22.04) and arm64 (ubuntu-24.04-arm) — native build
  # against system Qt5/Boost/OpenSSL/libevent + Berkeley DB 4.8 (install_db4.sh).
  # -------------------------------------------------------------------------
  linux:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-22.04
          - name: linux-arm64
            runner: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libtool autotools-dev automake pkg-config bsdmainutils \
            curl ca-certificates python3 \
            libssl-dev libevent-dev libboost-all-dev \
            qtbase5-dev qttools5-dev qttools5-dev-tools libqt5svg5-dev \
            libprotobuf-dev protobuf-compiler libqrencode-dev libminiupnpc-dev
      - name: Build Berkeley DB 4.8
        run: ./contrib/install_db4.sh "$(pwd)"
      - name: Build minimal static libzmq
        run: |
          # Mining pools (NOMP) need ZMQ block notifications, which the official
          # depends build shipped. Ubuntu's libzmq.a drags in krb5/pgm/norm/icu and
          # can't be statically linked cleanly, so build a minimal libzmq from
          # source (no libsodium/pgm/norm/gssapi) -> a dependency-free static
          # libzmq.a that enables ZMQ without breaking the portable linking above.
          git clone --depth 1 -b v4.3.5 https://github.com/zeromq/libzmq /tmp/libzmq
          cd /tmp/libzmq
          ./autogen.sh
          ./configure --prefix="$HOME/zmqinst" --disable-shared --enable-static --without-libsodium
          make ${MAKEJOBS}
          make install
      - name: Build VIPSTARCOIN
        run: |
          ./autogen.sh
          export BDB_PREFIX="$PWD/db4"
          export PKG_CONFIG_PATH="$HOME/zmqinst/lib/pkgconfig:$PKG_CONFIG_PATH"
          ./configure --with-gui=qt5 \
            BDB_LIBS="-L${BDB_PREFIX}/lib -ldb_cxx-4.8" BDB_CFLAGS="-I${BDB_PREFIX}/include"
          # Statically link the version-volatile libraries (Boost, miniupnpc,
          # libevent; BDB 4.8 is already static) so VIPSTARCOINd/-cli/-tx run on
          # any modern glibc -- e.g. Debian 13 (Boost 1.83) -- instead of needing
          # the build host's exact .so versions. libcrypto/glibc/libstdc++ stay
          # dynamic (stable, security-updated, present on every modern distro).
          L=/usr/lib/$(gcc -print-multiarch)
          make ${MAKEJOBS} \
            BOOST_LIBS="-Wl,--start-group $L/libboost_system.a $L/libboost_filesystem.a $L/libboost_program_options.a $L/libboost_thread.a $L/libboost_chrono.a $L/libboost_random.a -Wl,--end-group" \
            MINIUPNPC_LIBS="$L/libminiupnpc.a" \
            EVENT_LIBS="$L/libevent.a" \
            EVENT_PTHREADS_LIBS="$L/libevent_pthreads.a $L/libevent.a"
      - name: Stage and package
        run: |
          OUT="VIPSTARCOIN-${{ matrix.name }}"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt "$OUT/" 2>/dev/null || true
          strip "$OUT/"* 2>/dev/null || true
          ls -lh "$OUT"
          tar -czf "${OUT}.tar.gz" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: VIPSTARCOIN-${{ matrix.name }}.tar.gz
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # macOS arm64 (macos-14) — native build via Homebrew.
  # (amd64/macos-13 dropped: GitHub's free Intel runner never schedules, so the
  # job sat queued indefinitely and stalled the release publish job.)
  # -------------------------------------------------------------------------
  macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: brew install automake libtool boost pkg-config libevent qt@5 berkeley-db@4 qrencode miniupnpc protobuf@21 openssl@3
      - name: Build VIPSTARCOIN
        run: |
          ./autogen.sh
          export PATH="$(brew --prefix qt@5)/bin:$(brew --prefix protobuf@21)/bin:$PATH"
          export PKG_CONFIG_PATH="$(brew --prefix qt@5)/lib/pkgconfig:$(brew --prefix protobuf@21)/lib/pkgconfig:$(brew --prefix openssl@3)/lib/pkgconfig"
          BDB="$(brew --prefix berkeley-db@4)"
          BOOST="$(brew --prefix boost)"
          # Homebrew Boost (>=1.84) requires C++14+, but the tree configures as
          # C++11. Build macOS as C++14 (a near-superset of C++11) so Boost's
          # headers compile and AX_BOOST_SYSTEM's link test succeeds.
          # --disable-shared: macOS ld rejects undefined symbols in the shared
          # libbitcoinconsensus.dylib (the binaries are linked from the static
          # libs anyway), so skip building it.
          ./configure --with-gui=qt5 --with-incompatible-bdb --disable-reduce-exports --disable-shared \
            --with-boost="$BOOST" --with-boost-libdir="$BOOST/lib" \
            CXXFLAGS="-std=c++14" \
            BDB_LIBS="-L${BDB}/lib -ldb_cxx" BDB_CFLAGS="-I${BDB}/include"
          make ${MAKEJOBS}
      - name: Stage and package
        run: |
          OUT="VIPSTARCOIN-${{ matrix.name }}"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt "$OUT/" 2>/dev/null || true
          ls -lh "$OUT"
          tar -czf "${OUT}.tar.gz" "$OUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: VIPSTARCOIN-${{ matrix.name }}.tar.gz
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Windows amd64 — native MSYS2/MinGW GUI build. MSYS2 ships protobuf 5.x (needs
  # C++17, which breaks the tree's C++11 configure probe), so a minimal protobuf
  # 3.21 is built from source as C++14 and the Qt5 GUI is linked against it. Qt is
  # found via pkg-config (WANT_PKGCONFIG) and linked dynamically (MinGW's forced
  # -all-static can't find Qt, which MSYS2 ships as DLLs only); the Qt DLLs +
  # plugins are bundled with windeployqt. Produces daemon/cli/tx + the GUI.
  # -------------------------------------------------------------------------
  windows-amd64:
    name: windows-amd64
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git autoconf automake libtool pkgconf zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-db
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-svg
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib
      - name: Build protobuf 3.21 (C++14, static)
        run: |
          set -e
          git clone --depth 1 -b v3.21.12 https://github.com/protocolbuffers/protobuf "$HOME/pbsrc"
          cd "$HOME/pbsrc"
          cmake -G Ninja -S . -B build \
            -DCMAKE_BUILD_TYPE=Release -Dprotobuf_BUILD_TESTS=OFF \
            -Dprotobuf_BUILD_SHARED_LIBS=OFF -Dprotobuf_WITH_ZLIB=OFF \
            -DCMAKE_CXX_STANDARD=14 -DCMAKE_INSTALL_PREFIX="$HOME/pb21"
          ninja -C build && ninja -C build install
      - name: Build VIPSTARCOIN (Qt5 GUI)
        run: |
          set -e
          unset JAVA_HOME
          # pkg-config for Qt5/protobuf (WANT_PKGCONFIG opts MinGW back in; ALLOW_
          # SYSTEM_LIBS makes it emit -L/mingw64/lib so libtool resolves Qt).
          export WANT_PKGCONFIG=yes PKG_CONFIG_ALLOW_SYSTEM_LIBS=1 PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1
          export PKG_CONFIG_PATH="$HOME/pb21/lib/pkgconfig:/mingw64/lib/pkgconfig:$PKG_CONFIG_PATH"
          export PATH="$HOME/pb21/bin:$PATH"
          ./autogen.sh
          ./configure --with-gui=qt5 --without-miniupnpc --with-incompatible-bdb --disable-reduce-exports --disable-shared \
            --with-boost=/mingw64 --with-boost-libdir=/mingw64/lib \
            CXXFLAGS="-std=c++14" \
            PROTOC="$HOME/pb21/bin/protoc.exe" \
            MOC=/mingw64/bin/moc UIC=/mingw64/bin/uic RCC=/mingw64/bin/rcc \
            LRELEASE=/mingw64/bin/lrelease-qt5 LUPDATE=/mingw64/bin/lupdate-qt5 \
            BDB_LIBS="-ldb_cxx" BDB_CFLAGS=""
          # MinGW forces LIBTOOL_APP_LDFLAGS=-all-static, which needs static Qt libs
          # that MSYS2 doesn't ship; override so Qt links dynamically (DLLs bundled).
          make ${MAKEJOBS} LIBTOOL_APP_LDFLAGS=
      - name: Stage and package (windeployqt + DLLs)
        run: |
          # GitHub forces -eo pipefail; turn it off for best-effort DLL bundling.
          set +e +o pipefail
          OUT="VIPSTARCOIN-windows-amd64"; mkdir -p "$OUT"
          for b in VIPSTARCOINd VIPSTARCOIN-cli VIPSTARCOIN-tx; do cp "src/$b.exe" "$OUT/" 2>/dev/null || true; done
          cp src/qt/VIPSTARCOIN-qt.exe "$OUT/"
          WDQ=$(command -v windeployqt || command -v windeployqt-qt5)
          "$WDQ" --release --compiler-runtime --no-opengl-sw "$OUT/VIPSTARCOIN-qt.exe" \
            || echo "windeployqt non-zero (optional GL DLL missing); continuing"
          # windeployqt can bail before copying the platform plugin (no GUI without
          # it), so copy the essential Qt plugins by hand.
          QTP=/mingw64/share/qt5/plugins
          mkdir -p "$OUT/platforms" "$OUT/styles" "$OUT/imageformats"
          cp "$QTP/platforms/qwindows.dll" "$OUT/platforms/" 2>/dev/null
          cp "$QTP/styles/qwindowsvistastyle.dll" "$OUT/styles/" 2>/dev/null
          cp "$QTP"/imageformats/q*.dll "$OUT/imageformats/" 2>/dev/null
          # Bundle remaining MinGW/runtime DLLs the binaries + plugins need.
          for pass in 1 2 3; do
            for f in "$OUT"/*.exe "$OUT"/*.dll "$OUT"/platforms/*.dll "$OUT"/styles/*.dll "$OUT"/imageformats/*.dll; do
              [ -e "$f" ] || continue
              ldd "$f" 2>/dev/null | grep -i '/mingw64/bin/' | awk '{print $3}' | while read -r d; do
                cp -n "$d" "$OUT/" 2>/dev/null || true
              done
            done
          done
          ls -1 "$OUT" | head -60; echo "file count: $(ls -1 "$OUT" | wc -l)"
          zip -r "${OUT}.zip" "$OUT" >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: VIPSTARCOIN-windows-amd64.zip
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Publish whatever built successfully (tag pushes only). Runs even if some
  # platform jobs failed, so a partial set of binaries is still released.
  # -------------------------------------------------------------------------
  release:
    name: Publish Release
    # Gate on linux + macOS (both build now). Windows stays continue-on-error
    # and attaches its artifacts when it succeeds.
    needs: [linux, macos]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Show artifacts
        run: find artifacts -type f || true
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          name: VIPSTARCOIN ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: artifacts/**/*
